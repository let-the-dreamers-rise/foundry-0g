kind = "web"
previewPath = "/"
title = "Foundry"
version = "1.0.0"
id = "artifacts/foundry"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24293

[services.development]
run = "pnpm --filter @workspace/foundry run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/foundry", "run", "build" ]
publicDir = "artifacts/foundry/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24293"
BASE_PATH = "/"
