services:
  - type: web
    name: foundry-0g-api
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: FOUNDRY_CONTRACT_ADDRESS
        value: 0xA0448Cd63f746a60447cfF1817ec9781C25F7b25
      - key: OG_EVM_RPC
        value: https://evmrpc-testnet.0g.ai
      - key: OG_INDEXER_RPC
        value: https://indexer-storage-testnet-standard.0g.ai
      - key: DATABASE_URL
        fromDatabase:
          name: foundry-0g-db
          property: connectionString

databases:
  - name: foundry-0g-db
    databaseName: foundry_0g
    user: foundry_0g
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
